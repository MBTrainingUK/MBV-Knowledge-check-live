<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBV Knowledge Check</title>
  <style>
    @font-face {
      font-family: 'MBCorpoATitle';
      src: url('../fonts/MBCorpoATitleOffice-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MBCorpoSText';
      src: url('../fonts/MBCorpoSTextOffice-Light.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MBCorpoSText';
      src: url('../fonts/MBCorpoSTextOffice-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MBCorpoSText';
      src: url('../fonts/MBCorpoSTextOffice-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #000000;
      --white:   #ffffff;
      --silver:  #b0b0b0;
      --silver2: #d4d4d4;
      --grey1:   #1a1a1a;
      --grey2:   #2a2a2a;
      --grey3:   #3a3a3a;
      --grey4:   #4a4a4a;
      --accent:  #c0a96b;  /* MB warm silver-gold */
      --correct: #3a7d44;
      --wrong:   #8b1a1a;
      --radius:  4px;
      --radius-lg: 8px;
    }

    html, body { height: 100%; font-family: 'MBCorpoSText', 'Segoe UI', Arial, sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }

    /* ── HEADER ── */
    header {
      background: var(--black);
      border-bottom: 1px solid var(--grey3);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo-wrap { display: flex; align-items: center; gap: 16px; }
    .mb-star {
      width: 40px; height: 40px; flex-shrink: 0;
    }
    .logo { font-size: 0.72rem; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--silver2); font-family: 'MBCorpoSText', sans-serif; }
    .header-divider { width: 1px; height: 28px; background: var(--grey3); }
    .header-sub { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--grey4); font-weight: 400; }
    #header-right { font-size: 0.72rem; color: var(--silver); letter-spacing: 1px; }

    /* ── PROGRESS ── */
    #progress-wrap { background: var(--grey1); padding: 0 32px; border-bottom: 1px solid var(--grey2); }
    #progress-bar-bg { height: 2px; background: var(--grey3); overflow: hidden; }
    #progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; width: 0%; }
    #progress-label { font-size: 0.6rem; color: var(--grey4); padding: 6px 0 7px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }

    main { max-width: 760px; margin: 0 auto; padding: 32px 24px 64px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn   { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.6} }
    @keyframes correct { 0%{transform:scale(1)} 30%{transform:scale(1.03)} 100%{transform:scale(1)} }
    @keyframes shake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

    /* ── WELCOME ── */
    .welcome-wrap { text-align: center; padding: 40px 8px; animation: fadeUp 0.5s ease; }
    .welcome-star { margin: 0 auto 20px; }
    .welcome-star svg { width: 72px; height: 72px; }
    .welcome-eyebrow { font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase; color: var(--silver); margin-bottom: 20px; font-weight: 400; }
    .welcome-title { font-size: 2rem; font-weight: 400; margin-bottom: 12px; line-height: 1.25; letter-spacing: 0; color: var(--white); font-family: 'MBCorpoATitle', serif; }
    .welcome-title strong { font-weight: 400; font-family: 'MBCorpoATitle', serif; }
    .welcome-sub { font-size: 0.9rem; color: var(--silver); margin-bottom: 36px; line-height: 1.7; max-width: 460px; margin-left: auto; margin-right: auto; font-weight: 300; }
    .welcome-divider { width: 40px; height: 1px; background: var(--accent); margin: 0 auto 32px; }

    .info-pills { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .pill { background: var(--grey2); border: 1px solid var(--grey3); border-radius: 2px; padding: 6px 16px; font-size: 0.72rem; color: var(--silver2); letter-spacing: 0.5px; font-weight: 400; }
    .pill strong { color: var(--accent); font-weight: 600; }

    .prize-box { background: var(--grey1); border: 1px solid var(--grey3); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 16px 20px; margin: 0 auto 32px; max-width: 440px; display: flex; align-items: flex-start; gap: 14px; text-align: left; }
    .prize-box .icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
    .prize-box p { font-size: 0.82rem; color: var(--silver); line-height: 1.6; font-weight: 300; }
    .prize-box strong { color: var(--white); font-weight: 600; }

    /* ── BUTTONS ── */
    .btn { display: inline-block; padding: 14px 36px; border-radius: var(--radius); font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 1.5px; text-transform: uppercase; font-family: inherit; }
    .btn-primary { background: var(--white); color: var(--black); }
    .btn-primary:hover { background: var(--silver2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,255,255,0.15); }
    .btn-ghost { background: transparent; color: var(--white); border: 1px solid var(--grey3); }
    .btn-ghost:hover { border-color: var(--silver); background: var(--grey2); }
    .btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* legacy alias */
    .btn-gold { background: var(--white); color: var(--black); }
    .btn-gold:hover { background: var(--silver2); transform: translateY(-1px); }

    /* ── FORM CARD ── */
    .form-card { background: var(--grey1); border: 1px solid var(--grey3); border-radius: var(--radius-lg); padding: 32px 36px; max-width: 480px; margin: 24px auto 0; animation: fadeUp 0.4s ease; }
    .form-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
    .form-card .sub { font-size: 0.8rem; color: var(--silver); margin-bottom: 28px; font-weight: 300; line-height: 1.6; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px; }
    .field input { width: 100%; background: var(--black); border: 1px solid var(--grey3); border-radius: var(--radius); padding: 12px 14px; font-size: 0.9rem; color: var(--white); font-family: inherit; transition: border-color 0.2s; font-weight: 300; }
    .field input:focus { outline: none; border-color: var(--silver2); }
    .field input::placeholder { color: var(--grey4); }

    /* ── STAGE INTRO ── */
    .stage-intro { text-align: center; padding: 48px 20px; animation: fadeUp 0.4s ease; }
    .stage-badge { display: inline-block; background: transparent; color: var(--accent); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; padding: 6px 16px; border: 1px solid var(--accent); border-radius: 2px; margin-bottom: 24px; }
    .stage-intro h2 { font-size: 1.8rem; font-weight: 400; margin-bottom: 12px; letter-spacing: 0; font-family: 'MBCorpoATitle', serif; }
    .stage-intro p { font-size: 0.88rem; color: var(--silver); max-width: 400px; margin: 0 auto 32px; line-height: 1.7; font-weight: 300; }
    .stage-count { font-size: 4rem; font-weight: 200; color: var(--white); letter-spacing: -2px; margin-bottom: 4px; }

    /* ── QUESTION IMAGE ── */
    .q-image-wrap { width: 100%; height: 220px; border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; position: relative; background: var(--grey1); animation: fadeUp 0.4s ease; border: 1px solid var(--grey2); }
    .q-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .q-image-none { display: flex; align-items: center; justify-content: center; height: 100%; }
    .q-image-none svg { width: 48px; height: 48px; opacity: 0.2; }

    .q-number { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; animation: slideIn 0.3s ease; }
    .q-text { font-size: 1.1rem; font-weight: 400; line-height: 1.5; margin-bottom: 24px; animation: fadeUp 0.35s ease 0.05s both; color: var(--white); font-family: 'MBCorpoATitle', serif; }

    /* ── OPTIONS ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .opt-btn {
      position: relative; display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; border: 1px solid var(--grey3);
      border-radius: var(--radius); font-size: 0.88rem; font-weight: 400;
      color: var(--silver2); cursor: pointer; text-align: left;
      background: var(--grey1);
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      min-height: 68px; line-height: 1.4;
      animation: popIn 0.3s ease both;
      font-family: inherit;
    }
    .opt-btn:nth-child(1) { animation-delay: 0.04s; }
    .opt-btn:nth-child(2) { animation-delay: 0.08s; }
    .opt-btn:nth-child(3) { animation-delay: 0.12s; }
    .opt-btn:nth-child(4) { animation-delay: 0.16s; }
    .opt-btn:hover:not(:disabled):not(.revealed) { border-color: var(--silver2); background: var(--grey2); transform: translateY(-2px); }
    .opt-btn:active:not(:disabled) { transform: scale(0.98); }
    .opt-label { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--grey3); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; flex-shrink: 0; color: var(--silver); letter-spacing: 0; transition: background 0.15s, border-color 0.15s; }
    .opt-btn .opt-text { flex: 1; }
    .opt-btn.revealed { cursor: default; }
    .opt-btn.revealed.correct-ans { background: rgba(58,125,68,0.2); border-color: var(--correct); color: var(--white); animation: correct 0.4s ease; }
    .opt-btn.revealed.correct-ans .opt-label { background: var(--correct); border-color: var(--correct); color: #fff; }
    .opt-btn.revealed.wrong-ans   { opacity: 0.3; }
    .opt-btn.revealed.was-selected.wrong-ans { background: rgba(139,26,26,0.2); border-color: var(--wrong); opacity: 1; animation: shake 0.4s ease; }
    .opt-btn.revealed.was-selected.wrong-ans .opt-label { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    /* ── OPEN TEXT ── */
    .open-wrap { animation: fadeUp 0.4s ease; }
    .open-wrap textarea { width: 100%; min-height: 140px; background: var(--grey1); border: 1px solid var(--grey3); border-radius: var(--radius); padding: 14px 16px; font-size: 0.9rem; color: var(--white); font-family: inherit; resize: vertical; line-height: 1.7; transition: border-color 0.2s; font-weight: 300; }
    .open-wrap textarea:focus { outline: none; border-color: var(--silver2); }
    .open-wrap textarea::placeholder { color: var(--grey4); }
    .char-count { font-size: 0.65rem; color: var(--grey4); text-align: right; margin-top: 6px; letter-spacing: 0.5px; }

    /* ── FEEDBACK ── */
    .feedback-banner { border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 12px; animation: popIn 0.25s ease; letter-spacing: 0.2px; }
    .feedback-banner.correct   { background: rgba(58,125,68,0.15); border: 1px solid var(--correct); color: #7ec887; }
    .feedback-banner.incorrect { background: rgba(139,26,26,0.15); border: 1px solid var(--wrong); color: #e08080; }
    .feedback-banner .fb-icon  { font-size: 1.1rem; flex-shrink: 0; }

    /* ── NAV ── */
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; }
    .skip-hint { font-size: 0.68rem; color: var(--grey4); letter-spacing: 0.5px; }

    /* ── THANK YOU ── */
    .thankyou-wrap { text-align: center; padding: 40px 16px; animation: fadeUp 0.5s ease; }
    .thankyou-star { margin: 0 auto 24px; animation: popIn 0.5s ease 0.2s both; }
    .thankyou-star svg { width: 64px; height: 64px; }
    .thankyou-wrap h1 { font-size: 1.8rem; font-weight: 400; margin-bottom: 10px; letter-spacing: 0; font-family: 'MBCorpoATitle', serif; }
    .thankyou-wrap .sub { font-size: 0.88rem; color: var(--silver); max-width: 440px; margin: 0 auto 32px; line-height: 1.7; font-weight: 300; }
    .ty-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 480px; margin: 0 auto 24px; }
    .ty-card { background: var(--grey1); border: 1px solid var(--grey3); border-radius: var(--radius); padding: 18px; text-align: left; }
    .ty-card h3 { font-size: 0.65rem; color: var(--accent); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.5px; }
    .ty-card p { font-size: 0.78rem; color: var(--silver); line-height: 1.6; font-weight: 300; }

    #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

    footer { text-align: center; padding: 20px; font-size: 0.6rem; color: var(--grey4); border-top: 1px solid var(--grey2); letter-spacing: 1px; text-transform: uppercase; }

    @media (max-width: 520px) {
      .options-grid { grid-template-columns: 1fr; }
      .ty-cards { grid-template-columns: 1fr; }
      .q-image-wrap { height: 160px; }
      .welcome-title { font-size: 1.6rem; }
      .q-text { font-size: 1rem; }
      .form-card { padding: 24px 20px; }
      header { padding: 0 16px; }
      #progress-wrap { padding: 0 16px; }
      main { padding: 24px 16px 48px; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
  <div class="logo-wrap">
    <svg class="mb-star" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" stroke="#b0b0b0" stroke-width="1.5" fill="none"/>
      <path d="M50 8 L50 50 L85 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M50 8 L50 50 L15 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M85 72 L15 72" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="header-divider"></div>
    <div>
      <div class="logo">Mercedes-Benz Vans</div>
      <div class="header-sub">Knowledge Check</div>
    </div>
  </div>
  <div id="header-right"></div>
</header>

<div id="progress-wrap">
  <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
  <div id="progress-label">Ready to start</div>
</div>

<main id="screen-container"></main>

<footer>MBV Internal Use Only · Product &amp; Competition Programme · © 2026</footer>

<script>
const QUESTIONS_FILE = 'questions.json';
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbzV0YTUEFU0bqaNqF_Uy-usj52moJl1xlywveL-IlDhQKKkyFP67GtJVb524KPn5ZuP/exec';
const SHAPES  = ['A','B','C','D'];

let DATA        = null;
let ALL_QS      = [];
let CURRENT     = 0;
let ANSWERS     = {};
let PARTICIPANT = {};
let REVEALED    = false;

function buildQuestionList(data) {
  const list = [];
  list.push({ type: '__stage_intro', stage: 1, data: data.stage1 });
  data.stage1.questions.forEach(q => list.push({ type: q.type, stage: 1, data: q }));
  list.push({ type: '__stage_intro', stage: 2, data: data.stage2 });
  data.stage2.questions.forEach(q => list.push({ type: q.type, stage: 2, data: q }));
  return list;
}

function totalQ()    { return DATA.stage1.questions.length + DATA.stage2.questions.length; }
function answeredQ() { return Object.keys(ANSWERS).length; }

function updateProgress() {
  const pct = totalQ() === 0 ? 0 : Math.round((answeredQ() / totalQ()) * 100);
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    pct === 0   ? 'Ready to start' :
    pct === 100 ? 'All done ✓' :
    `${answeredQ()} of ${totalQ()} questions answered`;
}

function setScreen(html) {
  document.getElementById('screen-container').innerHTML = html;
}

/* WELCOME */
function showWelcome() {
  setScreen(`
    <div class="welcome-wrap">
      <div class="welcome-star">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" stroke="#4a4a4a" stroke-width="1" fill="none"/>
          <path d="M50 8 L50 50 L85 72" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M50 8 L50 50 L15 72" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M85 72 L15 72" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="welcome-eyebrow">Product &amp; Competition Programme</div>
      <h1 class="welcome-title">8-Week Post-Training<br><strong>Knowledge Check</strong></h1>
      <div class="welcome-divider"></div>
      <p class="welcome-sub">This isn't a test — there are no pass or fail scores. Your answers help us make future training even better.</p>
      <div class="info-pills">
        <div class="pill"><strong>${DATA.cohort}</strong></div>
        <div class="pill"><strong>${totalQ()}</strong> questions</div>
        <div class="pill">~8–12 mins</div>
        <div class="pill">MCQ + open</div>
      </div>
      <div class="prize-box">
        <div class="icon">🎁</div>
        <p><strong>You could win a prize!</strong> Complete the full knowledge check to be entered into the prize draw. Winners notified by email.</p>
      </div>
      <button class="btn btn-primary" id="btn-start">Begin →</button>
    </div>
  `);
  document.getElementById('btn-start').addEventListener('click', showNameScreen);
  updateProgress();
}

/* NAME SCREEN */
function showNameScreen() {
  setScreen(`
    <div class="form-card">
      <h2>Before we begin…</h2>
      <p class="sub">Just a couple of details so we can enter you into the prize draw.</p>
      <div class="field"><label>Full Name</label><input id="f-name" type="text" placeholder="e.g. Sarah Jones" autocomplete="name" /></div>
      <div class="field"><label>Work Email</label><input id="f-email" type="email" placeholder="e.g. sarah.jones@mercedes-benz.com" /></div>
      <div class="field"><label>Master Agent (MA)</label><input id="f-ma" type="text" placeholder="e.g. London South" /></div>
      <div class="nav-row" style="margin-top:24px;"><span></span>
        <button class="btn btn-gold" id="btn-name-next">Continue →</button>
      </div>
    </div>
  `);
  document.getElementById('btn-name-next').addEventListener('click', () => {
    const name  = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const ma    = document.getElementById('f-ma').value.trim();
    if (!name || !email) { alert('Please enter your name and email to continue.'); return; }
    PARTICIPANT = { name, email, ma };
    document.getElementById('header-right').textContent = name.split(' ')[0];
    CURRENT = 0;
    showQuestion(0);
  });
}

/* STAGE INTRO */
function showStageIntro(item, idx) {
  const s     = item.data;
  const count = item.stage === 1 ? DATA.stage1.questions.length : DATA.stage2.questions.length;
  setScreen(`
    <div class="stage-intro">
      <div class="stage-badge">${s.label}</div>
      <div class="stage-count">${count}</div>
      <p style="font-size:0.72rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Questions</p>
      <h2>${item.stage === 1 ? 'Quick-fire Questions' : 'Deeper Dive'}</h2>
      <p>${s.description}</p>
      <button class="btn btn-gold" id="btn-stage-go">Start ${s.label} →</button>
    </div>
  `);
  document.getElementById('btn-stage-go').addEventListener('click', () => showQuestion(idx + 1));
}

/* QUESTION ROUTER */
function showQuestion(idx) {
  CURRENT  = idx;
  REVEALED = false;
  if (idx >= ALL_QS.length) { saveAndFinish(); return; }
  const item = ALL_QS[idx];
  if (item.type === '__stage_intro') { showStageIntro(item, idx); return; }
  const allReal = ALL_QS.filter(q => q.type !== '__stage_intro');
  const qNum    = allReal.findIndex(q => q.data.id === item.data.id) + 1;
  if (item.type === 'mcq') showMCQ(item.data, idx, qNum, allReal.length);
  else                      showOpen(item.data, idx, qNum, allReal.length);
}

/* MCQ */
function showMCQ(q, idx, qNum, total) {
  const imgHtml = q.image
    ? `<div class="q-image-wrap"><img src="${q.image}" alt="Mercedes-Benz van" loading="lazy" /></div>`
    : `<div class="q-image-wrap"><div class="q-image-none"><svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px;opacity:0.15"><circle cx="50" cy="50" r="48" stroke="white" stroke-width="1.5" fill="none"/><path d="M50 8 L50 50 L85 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M50 8 L50 50 L15 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M85 72 L15 72" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg></div></div>`;

  const opts = q.options.map((opt, i) => `
    <button class="opt-btn" data-idx="${i}">
      <span class="opt-label">${SHAPES[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>`).join('');

  const saved = ANSWERS[q.id];
  const prevIdx = findPrev(idx);

  setScreen(`
    <div>
      ${imgHtml}
      <div class="q-number">Question ${qNum} of ${total} · Stage ${ALL_QS[idx].stage}</div>
      <div class="q-text">${q.text}</div>
      <div class="options-grid" id="opts-grid">${opts}</div>
      <div id="feedback-area"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btn-prev" style="visibility:${prevIdx >= 0 ? 'visible':'hidden'}">← Back</button>
        <span></span>
        <button class="btn btn-gold" id="btn-next" ${saved === undefined ? 'disabled' : ''}>Next →</button>
      </div>
    </div>
  `);

  if (saved !== undefined) revealMCQ(q, saved, false);

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (REVEALED) return;
      const chosen = parseInt(btn.getAttribute('data-idx'));
      ANSWERS[q.id] = chosen;
      revealMCQ(q, chosen, true);
      updateProgress();
    });
  });

  document.getElementById('btn-next').addEventListener('click', () => showQuestion(idx + 1));
  const prevBtn = document.getElementById('btn-prev');
  if (prevBtn && prevIdx >= 0) prevBtn.addEventListener('click', () => showQuestion(prevIdx));
}

function revealMCQ(q, chosen, animate) {
  REVEALED = true;
  const isCorrect = chosen === q.correct;
  document.querySelectorAll('.opt-btn').forEach((btn, i) => {
    btn.classList.add('revealed');
    btn.disabled = true;
    if (i === q.correct)      btn.classList.add('correct-ans');
    else {
      btn.classList.add('wrong-ans');
      if (i === chosen) btn.classList.add('was-selected');
    }
  });
  const fb = document.getElementById('feedback-area');
  if (fb) {
    fb.innerHTML = isCorrect
      ? `<div class="feedback-banner correct"><span class="fb-icon">✓</span><span>Correct — well done.</span></div>`
      : `<div class="feedback-banner incorrect"><span class="fb-icon">✗</span><span>The correct answer was: <strong>${q.options[q.correct]}</strong></span></div>`;
  }
  document.getElementById('btn-next').removeAttribute('disabled');
  if (animate && isCorrect) launchConfetti();
}

/* OPEN */
function showOpen(q, idx, qNum, total) {
  const prevIdx = findPrev(idx);
  setScreen(`
    <div class="open-wrap">
      <div class="q-number">Question ${qNum} of ${total} · Open-Ended</div>
      <div class="q-text">${q.text}</div>
      <textarea id="q-ta" placeholder="Type your answer here…" maxlength="1000">${ANSWERS[q.id] || ''}</textarea>
      <div class="char-count"><span id="cc">${(ANSWERS[q.id] || '').length}</span> / 1000</div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btn-prev" style="visibility:${prevIdx >= 0 ? 'visible':'hidden'}">← Back</button>
        <span class="skip-hint">You can skip if you prefer</span>
        <button class="btn btn-gold" id="btn-next">Next →</button>
      </div>
    </div>
  `);
  const ta = document.getElementById('q-ta');
  const cc = document.getElementById('cc');
  ta.addEventListener('input', () => { ANSWERS[q.id] = ta.value; cc.textContent = ta.value.length; updateProgress(); });
  document.getElementById('btn-next').addEventListener('click', () => showQuestion(idx + 1));
  const prevBtn = document.getElementById('btn-prev');
  if (prevBtn && prevIdx >= 0) prevBtn.addEventListener('click', () => showQuestion(prevIdx));
}

function findPrev(idx) {
  for (let i = idx - 1; i >= 0; i--) {
    if (ALL_QS[i].type !== '__stage_intro') return i;
  }
  return -1;
}

/* SAVE & THANK YOU */
function saveAndFinish() {
  const response = {
    id:          (typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString()),
    timestamp:   new Date().toISOString(),
    cohort:      DATA.cohort,
    training_date: DATA.training_date,
    participant: PARTICIPANT,
    answers:     ANSWERS,
    questions_snapshot: ALL_QS.filter(q => q.type !== '__stage_intro').map(q => ({ id: q.data.id, type: q.type, text: q.data.text }))
  };

  try {
    const existing = JSON.parse(localStorage.getItem('mbv_kc_responses') || '[]');
    const filtered = existing.filter(r => r.participant.email !== PARTICIPANT.email);
    filtered.push(response);
    localStorage.setItem('mbv_kc_responses', JSON.stringify(filtered));
  } catch(e) {}

  fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(response) })
    .catch(e => console.warn('Submit error', e));

  setScreen(`
    <div class="thankyou-wrap">
      <div class="thankyou-star">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" stroke="#c0a96b" stroke-width="1.5" fill="none"/>
          <path d="M50 8 L50 50 L85 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M50 8 L50 50 L15 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M85 72 L15 72" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <h1>Thank you, ${PARTICIPANT.name.split(' ')[0]}.</h1>
      <p class="sub">You've completed the MBV Knowledge Check and you're now entered into the prize draw. We'll be in touch if you're a winner!</p>
      <div class="ty-cards">
        <div class="ty-card"><h3>What happens next?</h3><p>Your responses will be reviewed by the T&amp;C team to shape future P&amp;C programme content.</p></div>
        <div class="ty-card"><h3>Your data</h3><p>Responses are not shared with your line manager and are used only to improve training.</p></div>
      </div>
      <p style="font-size:0.78rem;color:rgba(255,255,255,0.25);margin-top:12px;">You may now close this window.</p>
    </div>
  `);

  document.getElementById('progress-bar-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = 'Completed ✓';
  launchConfetti(5000);
}

/* CONFETTI */
function launchConfetti(duration = 1800) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const colours = ['#ffffff','#c0a96b','#b0b0b0','#d4d4d4','#888888','#e8e0d0','#f0f0f0'];
  const pieces  = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width, y: -10 - Math.random() * 80,
    r: 4 + Math.random() * 6, d: 2 + Math.random() * 3,
    color: colours[Math.floor(Math.random() * colours.length)],
    tilt: 0, tiltAngle: 0, tiltAngleInc: 0.05 + Math.random() * 0.1
  }));
  const end = Date.now() + duration;
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.tiltAngle += p.tiltAngleInc; p.y += p.d; p.tilt = Math.sin(p.tiltAngle) * 12;
      ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 3, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); ctx.stroke();
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
    });
    if (Date.now() < end) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  frame();
}

/* INIT */
async function init() {
  try {
    const res = await fetch(QUESTIONS_FILE);
    DATA   = await res.json();
    ALL_QS = buildQuestionList(DATA);
    showWelcome();
  } catch(e) {
    document.getElementById('screen-container').innerHTML = `
      <div style="padding:40px;text-align:center;">
        <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
        <h2 style="color:#ffc107;margin-bottom:8px;">Unable to load questions</h2>
        <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;">Ensure questions.json is in the same folder and you're running via a local server.</p>
        <p style="color:rgba(255,255,255,0.3);font-size:0.75rem;margin-top:8px;">${e.message}</p>
      </div>`;
  }
}

init();
</script>
